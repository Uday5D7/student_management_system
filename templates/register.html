<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center">


<div class="card-body">

{% if message %}

<div class="alert alert-info">
{{ message }}
</div>

{% endif %}

<form method="POST">

<label for="username">Username</label>
<input type="text"
       id="username"
       name="username"
       class="form-control mb-3">

<label for="email">Email</label>
<input type="email"
       id="email"
       name="email"
       class="form-control mb-3">

<label for="password">Password</label>
<input type="password"
       id="password"
       name="password"
       class="form-control mb-3">

<button
type="submit"
class="btn btn-success w-100">

Register

</button>

</form>

<hr>

<a href="/"
class="btn btn-primary w-100">

Back To Login

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
